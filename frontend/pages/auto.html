<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="auto.css">
    <title>BI</title>
</head>
<body>

    <div class="bi">
        <div class="c" >
            <span class="gear"  style="font-size: 40px;"> &#x2699;</span>
            <span class="clock" style="font-size: 20px;"> &#x2699;online | &#9201; ms</span>
        </div>
    </div>
    <div class="search">
        <h1 > <span class="fn">Being</span>Infinity</h1>
        <p class="p1">One milllion phrases. Four algorithms. Prefix Based Auto Suggest</p>
       <span>
            <span class ="lens"style="font-size: 20px;">&#128269;</span>
            <input  class="input" id="search"  placeholder="Start typing to search.." />
       </span>
       <div id="suggbox">
       <!--- <p>Suggestion Box</p>-->
       </div>
    </div>
    <script>
        var searchBox = document.getElementById("search");
        var suggBox = document.getElementById("suggbox");
        searchBox.addEventListener("input",function(){
            //1 : Get user types text
            var userInput=searchBox.value;
            if(userInput.trim()===""){

            }
            else{
                var url1= "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
                var url3="&algorithm=brute&limit=10&weighted=false";
                var url = url1+userInput+url3
                //2 : Make API call to get suggestion
                fetch(url)
                .then(function (response){
                    return response.json();
                })
                .then(function(data){
                    console.log(data);
                    //3 : Display data results in html
                    var resArray= data.results;
                    var htmlResults="";
                    for(var i=0;i<resArray.length;i++){
                        htmlResults+= "<div id='sugg-item'>"+ resArray[i].text+"</div>"
                    }
                    suggBox.innerHTML=htmlResults;

                })
            }
            
            
        })
    </script>
</body>
</html>
